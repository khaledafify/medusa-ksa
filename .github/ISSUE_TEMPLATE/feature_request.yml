name: Feature request
description: Suggest a new connector, capability, or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the problem first, then the solution you have in mind.

        Note the project scope: this is a **backend-only** toolkit that rides Medusa's native admin. We don't build storefront UI, RTL themes, accounting connectors, a COD package, or VAT calculation — see the [README](https://github.com/khaledafify/medusa-ksa/blob/main/README.md) and `CLAUDE.md` for what's in and out of scope.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the suite does this relate to?
      options:
        - New payment connector
        - New fulfillment connector
        - New notification connector
        - "@medusa-ksa/core (shared safety surface)"
        - ZATCA e-invoicing
        - Saudi address
        - create-medusa-ksa-app starter
        - Tooling / monorepo / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Who is affected and how?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? If it's a new connector, name the provider and link to its API docs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, or existing workarounds.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this has not been requested already.
          required: true
        - label: This fits the project's backend-only, native-admin scope.
          required: true
        - label: I am willing to help implement or test this.
          required: false
